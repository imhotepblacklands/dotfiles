[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[opener]
edit = [
	{ run = 'nvim "$@"', block = true, desc = "Edit" },
]

[open]
rules = [
	{ name = "*.txt", use = "edit" },
	{ name = "*.lua", use = "edit" },
	{ name = "*.toml", use = "edit" },
	{ name = "*.md", use = "edit" },
	{ name = "*.sh", use = "edit" },
	{ name = "*.fish", use = "edit" },
	{ name = "*.conf", use = "edit" },
]

[status]
separator_open  = ""
separator_close = ""
show_permissions = true
