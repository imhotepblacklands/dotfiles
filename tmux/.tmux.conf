
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g default-terminal "xterm-256color"
set -g status-position top
set -g status-justify centre
set -g status-left-length 50
set -g status-right-length 150

# Nerd Font Icons & Styling
set -g status-style "fg=#7aa2f7,bg=default"

set -g status-left "#[fg=#7aa2f7,bg=default]#[fg=#15161e,bg=#7aa2f7,bold]  #(whoami | sed 's/u0_a368/Imhotep/') #[fg=#7aa2f7,bg=#3b4261,nobold]#[fg=#7aa2f7,bg=#3b4261] #S #[fg=#3b4261,bg=default,nobold]"
set -g status-left-length 50

set -g status-right "#[fg=#3b4261,bg=default,nobold]#[fg=#7aa2f7,bg=#3b4261] #(~/bin/battery.sh) | #(~/bin/network.sh) #[fg=#7aa2f7,bg=#3b4261,nobold]#[fg=#15161e,bg=#7aa2f7,bold]  %l:%M %P #[fg=#7aa2f7,bg=default,nobold]"
set -g status-right-length 150
set -g status-interval 60
set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{?#{>:#{session_windows},1},#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}},}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"

setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=default"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=default"
setw -g window-status-format " #[fg=#a9b1d6,bg=default]#{?#{==:#I,1},󰬺,#{?#{==:#I,2},󰬻,#{?#{==:#I,3},󰬼,#{?#{==:#I,4},󰬽,#{?#{==:#I,5},󰬾,#{?#{==:#I,6},󰬿,#{?#{==:#I,7},󰭀,#{?#{==:#I,8},󰭁,#{?#{==:#I,9},󰭂,#{?#{==:#I,0},󰬹,#I}}}}}}}}}}#{?automatic-rename,,:#W} "
setw -g window-status-current-format "#[fg=#3b4261,bg=default]#[fg=#7aa2f7,bg=#3b4261,bold]#{?#{==:#I,1},󰬺,#{?#{==:#I,2},󰬻,#{?#{==:#I,3},󰬼,#{?#{==:#I,4},󰬽,#{?#{==:#I,5},󰬾,#{?#{==:#I,6},󰬿,#{?#{==:#I,7},󰭀,#{?#{==:#I,8},󰭁,#{?#{==:#I,9},󰭂,#{?#{==:#I,0},󰬹,#I}}}}}}}}}}#{?automatic-rename,,:#W}#[fg=#3b4261,bg=default]"

set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -sg escape-time 0
set -g display-panes-time 2500
set -g renumber-windows on
set -sa terminal-overrides ",xterm*:Tc"

set -g @tpm_plugins '              \
  tmux-plugins/tpm                 \
  tmux-plugins/tmux-sensible       \
  tmux-plugins/tmux-yank           \
  tmux-plugins/tmux-pain-control   \
  tmux-plugins/tmux-copycat        \
  tmux-plugins/tmux-sessionist     \
  jabirali/tmux-tilish             \
  sunaku/tmux-navigate             \
  tmux-plugins/tmux-resurrect      \
  tmux-plugins/tmux-continuum      \
  sainnhe/tmux-fzf                 \
'

# Install `tpm` if needed.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

# Plugin options.
set -g @tilish-navigate 'on'
set -g @tilish-default 'main-vertical'
set -g @tilish-dmenu 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @contimuum-restore 'on'
set -g @continuum-boot 'on'

unbind [
unbind p

# Key bindings
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind Escape copy-mode
bind-key R source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

bind-key p paste-buffer
bind-key a "detach-client -a"
bind-key K "kill-session"

bind-key t display-popup -E -d '#{pane_current_path}' -w 85% -h 85% fish
bind-key y display-popup -E -d '#{pane_current_path}' -w 85% -h 85% yazi
bind-key g display-popup -E -d '#{pane_current_path}' -w 85% -h 85% lazygit

bind-key -n F2 source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
bind-key -n C-F11 set -g status

# Use UTF-8 borders for smoother lines
set -g pane-border-lines "heavy" # Options: single, double, heavy, simple, number

# Active pane styling (the "highlighted" look)
set -g pane-active-border-style "fg=#89b4fa,bg=default"

# Inactive pane styling (the "dimmed" look)
set -g pane-border-style "fg=#313244,bg=default"

